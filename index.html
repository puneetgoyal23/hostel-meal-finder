<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Quick Meal Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🍜 Hostel Quick Meal Finder</h1>

  <div class="search-box">
    <input
      type="text"
      id="ingredientInput"
      placeholder="Enter ingredient (egg, bread, maggi)"
    >
    <button id="searchBtn">Search</button>
  </div>

  <div id="loading">Loading meals...</div>

  <div id="mealContainer"></div>

  <script src="sketch.js"></script>
</body>
</html>
